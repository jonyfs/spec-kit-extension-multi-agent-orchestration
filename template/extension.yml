---
schema_version: "1.0"

extension:
  id: "orchestration"
  name: "Multi-Agent Routing Verifier"
  version: "1.0.0"
  description: >-
    Verifies per-skill routing manifests against the project's governance:
    each declares a workflow stage's provider/model (by environment reference),
    reasoning effort, token budget and limit action, parallelism, graph
    retrieval, and exclusive artifact ownership. Reports ERROR/WARN/INFO and
    fails only on ERROR. It verifies declared contracts; it does not route,
    because the Spec Kit extension API cannot intercept model selection.
  author: "jonyfs"
  repository: "https://github.com/jonyfs/spec-kit-extension-multi-agent-orchestration"
  license: "MIT"
  homepage: "https://github.com/jonyfs/spec-kit-extension-multi-agent-orchestration"
  category: "quality"
  effect: "read-only"

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: "speckit.orchestration.check"
      file: "commands/check.md"
      description: >-
        Verify every routing manifest in the project against the routing
        principles, reporting blocking, advisory, and informational findings
      scripts:
        sh: "scripts/bash/routing-check.sh"
        ps: "scripts/powershell/routing-check.ps1"
      aliases:
        - "speckit.orchestration.verify"
  config:
    - name: "routing-manifest.schema.json"
      template: "routing-manifest.schema.json"
      required: false
      description: "Normative JSON Schema (draft 2020-12) for a routing manifest"
    - name: "skill-plan.yml"
      template: "config/skill-plan.yml"
      required: false
      description: "Routing manifest template for the planning stage (read-mostly)"
    - name: "skill-implement.yml"
      template: "config/skill-implement.yml"
      required: false
      description: "Routing manifest template for the implementation stage (parallel, writing)"

tags:
  - "quality"
  - "routing"
  - "governance"
  - "multi-agent"
